name: Apply CycloneDX Python 3.10 repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'fix/cyclonedx-attestation-rc2'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/cyclonedx-attestation-rc2
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Remove pre-3.12 nested f-string ambiguity
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/agent_reliability_arena/supply_chain.py')
          text = path.read_text(encoding='utf-8')
          old = (
              'def _verify_sbom(sbom: dict[str, Any], project: dict[str, Any], vendor: dict[str, Any]) -> None:\n'
              '    expected_serial = f"urn:uuid:{uuid.uuid5(uuid.NAMESPACE_URL, f\'https://github.com/Luca-1304/agent-reliability-arena@{project["version"]}\')}"\n'
          )
          new = (
              'def _verify_sbom(sbom: dict[str, Any], project: dict[str, Any], vendor: dict[str, Any]) -> None:\n'
              '    project_version = str(project["version"])\n'
              '    expected_serial = f"urn:uuid:{uuid.uuid5(uuid.NAMESPACE_URL, f\'https://github.com/Luca-1304/agent-reliability-arena@{project_version}\')}"\n'
          )
          assert text.count(old) == 1
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify Python 3.10 and complete suite
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --editable .
          python -m compileall -q src tests scripts
          python -m unittest discover -s tests -p "test_*.py" -v
          python scripts/verify_release.py
          python scripts/verify_disclosure_release.py
          python scripts/verify_repeated_release.py
          python scripts/verify_showcase_release.py
          python scripts/verify_launch_package.py
          python scripts/verify_citation_package.py
          python scripts/verify_supply_chain.py
          python scripts/verify_github_prerelease.py

      - name: Commit exact compatibility repair
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          test "$HEAD_REF" = "fix/cyclonedx-attestation-rc2"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/agent_reliability_arena/supply_chain.py
          git diff --cached --check
          test "$(git diff --cached --name-only | wc -l)" -eq 1
          git commit -m "fix: preserve CycloneDX serial on Python 3.10"
          git push origin "HEAD:$HEAD_REF"
