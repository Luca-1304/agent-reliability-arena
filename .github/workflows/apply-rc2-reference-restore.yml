name: Export rc2 fixture restoration tree

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/attested-v0.2.0rc2-prerelease'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v4
        with:
          ref: feature/attested-v0.2.0rc2-prerelease
          fetch-depth: 0
          persist-credentials: false

      - name: Reconstruct and verify add-only restoration
        run: |
          cat release/rc2-reference-restore/part-* > "$RUNNER_TEMP/rc2-reference-restore.patch.gz.b64"
          base64 --decode "$RUNNER_TEMP/rc2-reference-restore.patch.gz.b64" > "$RUNNER_TEMP/rc2-reference-restore.patch.gz"
          echo "1f01ce77cee204879bed9cbfe3e9437a2248398845cea800da4c495af3dba666  $RUNNER_TEMP/rc2-reference-restore.patch.gz" | sha256sum --check
          gzip --decompress --stdout "$RUNNER_TEMP/rc2-reference-restore.patch.gz" > "$RUNNER_TEMP/rc2-reference-restore.patch"
          echo "963144d2ddc0a7fa732c294688e8be0e3dc54cec92bbe019af5495dd263ffc6a  $RUNNER_TEMP/rc2-reference-restore.patch" | sha256sum --check
          test "$(grep -c '^diff --git ' "$RUNNER_TEMP/rc2-reference-restore.patch")" -eq 16
          test -z "$(grep '^diff --git ' "$RUNNER_TEMP/rc2-reference-restore.patch" | grep -v ' a/reference_runs/fixture-v1/runs/' || true)"
          test -z "$(grep '^-' "$RUNNER_TEMP/rc2-reference-restore.patch" | grep -v '^--- /dev/null' || true)"
          git apply --check "$RUNNER_TEMP/rc2-reference-restore.patch"
          git apply --whitespace=nowarn "$RUNNER_TEMP/rc2-reference-restore.patch"

      - name: Verify locked fixture inventory and full suite
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('reference_runs/fixture-v1')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          assert len(manifest['files']) == 20
          for item in manifest['files']:
              path = root / item['path']
              assert path.is_file(), item['path']
              assert len(path.read_bytes()) == item['size'], item['path']
              assert hashlib.sha256(path.read_bytes()).hexdigest() == item['sha256'], item['path']
          PY
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --editable .
          python -m compileall -q src tests scripts
          python -m unittest discover -s tests -p "test_*.py" -v
          python scripts/verify_release.py
          python scripts/verify_disclosure_release.py
          python scripts/verify_repeated_release.py
          python scripts/verify_showcase_release.py
          python scripts/verify_launch_package.py
          python scripts/verify_citation_package.py
          python scripts/verify_supply_chain.py
          python scripts/verify_github_prerelease.py

      - name: Build exact Git tree request
        run: |
          rm -rf release/rc2-reference-restore
          git add -A -- reference_runs/fixture-v1/runs release/rc2-reference-restore
          git diff --cached --check
          PARENT="$(git rev-parse HEAD)"
          BASE_TREE="$(git rev-parse 'HEAD^{tree}')"
          export PARENT BASE_TREE
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          rows = subprocess.check_output(
              ['git', 'diff', '--cached', '--name-status'], text=True
          ).splitlines()
          expected_adds = {
              f'reference_runs/fixture-v1/runs/{condition}/{scenario}.json'
              for condition in ('general', 'specialist')
              for scenario in (
                  'false_success', 'partial_write', 'path_traversal', 'rollback',
                  'success', 'symlink_escape', 'timeout_after_write',
                  'timeout_before_write',
              )
          }
          expected_deletes = {
              'release/rc2-reference-restore/part-000',
              'release/rc2-reference-restore/part-001',
          }
          actual_adds = {row.split('\t', 1)[1] for row in rows if row.startswith('A\t')}
          actual_deletes = {row.split('\t', 1)[1] for row in rows if row.startswith('D\t')}
          assert actual_adds == expected_adds, (actual_adds, expected_adds)
          assert actual_deletes == expected_deletes, (actual_deletes, expected_deletes)
          assert len(rows) == 18, rows

          entries = []
          for path in sorted(expected_adds):
              line = subprocess.check_output(['git', 'ls-files', '-s', '--', path], text=True).strip()
              mode, sha, stage_and_path = line.split(maxsplit=2)
              stage, indexed_path = stage_and_path.split('\t', 1)
              assert stage == '0' and indexed_path == path
              entries.append({'path': path, 'mode': mode, 'type': 'blob', 'sha': sha})
          for path in sorted(expected_deletes):
              entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})

          out = Path(os.environ['RUNNER_TEMP']) / 'rc2-restoration-request'
          out.mkdir()
          (out / 'tree-request.json').write_text(
              json.dumps({'base_tree': os.environ['BASE_TREE'], 'tree': entries}, indent=2) + '\n',
              encoding='utf-8',
          )
          (out / 'metadata.json').write_text(
              json.dumps({
                  'parent': os.environ['PARENT'],
                  'base_tree': os.environ['BASE_TREE'],
                  'entry_count': len(entries),
                  'fixture_additions': len(expected_adds),
                  'patch_deletions': len(expected_deletes),
                  'patch_sha256': '963144d2ddc0a7fa732c294688e8be0e3dc54cec92bbe019af5495dd263ffc6a',
                  'compressed_sha256': '1f01ce77cee204879bed9cbfe3e9437a2248398845cea800da4c495af3dba666',
                  'verification_passed': True,
              }, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Upload verified restoration request
        uses: actions/upload-artifact@v4
        with:
          name: rc2-restoration-tree-request
          path: ${{ runner.temp }}/rc2-restoration-request
          if-no-files-found: error
          retention-days: 1
