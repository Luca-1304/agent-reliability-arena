name: Capture rc2 branch snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create source snapshot
        run: |
          tar \
            --exclude=.git \
            --exclude='private-evidence' \
            --exclude='*.env' \
            --exclude='dist' \
            -czf rc2-branch-snapshot.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: rc2-branch-snapshot
          path: rc2-branch-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
