name: launch-hash-capture

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture exact launch-package file hashes
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path.cwd()
          manifest = json.loads((root / "showcase/launch-package-manifest.json").read_text(encoding="utf-8"))
          hashes = {
              row["path"]: hashlib.sha256((root / row["path"]).read_bytes()).hexdigest()
              for row in manifest["files"]
          }
          Path("launch-package-hashes.json").write_text(
              json.dumps(hashes, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload launch-package hash inventory
        uses: actions/upload-artifact@v4
        with:
          name: launch-package-hashes
          path: launch-package-hashes.json
          if-no-files-found: error
