name: Deploy verified showcase to GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Verify and package public site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --editable .

      - name: Verify locked public packages
        run: |
          python scripts/verify_showcase_release.py
          python scripts/verify_launch_package.py

      - name: Stage exact Pages artifact
        run: python scripts/stage_pages_site.py --root . --output _site

      - name: Verify staged allow-list
        run: |
          python - <<'PY'
          from pathlib import Path

          expected = {
              ".nojekyll",
              "app.js",
              "data/fixture-v1.json",
              "index.html",
              "styles.css",
          }
          root = Path("_site")
          actual = {
              path.relative_to(root).as_posix()
              for path in root.rglob("*")
              if path.is_file()
          }
          assert actual == expected, (sorted(actual), sorted(expected))
          assert not any(path.is_symlink() for path in root.rglob("*"))
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Publish verified site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live claims boundary
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          test -n "$PAGE_URL"
          curl --fail --location --retry 12 --retry-delay 5 --retry-all-errors "$PAGE_URL" -o /tmp/pages-index.html
          grep -F "Agent Reliability Arena — Evidence-first agent evaluation" /tmp/pages-index.html
          grep -F "No real-provider benchmark request or provider spend has been executed." /tmp/pages-index.html
          grep -F "comparative_claim_permitted: false" /tmp/pages-index.html
