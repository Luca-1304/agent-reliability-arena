name: deploy-pages

on:
  push:
    branches: [main, portfolio-site]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out main repository
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-source
      - name: Check out portfolio branch
        uses: actions/checkout@v4
        with:
          ref: portfolio-site
          path: portfolio-source
      - name: Assemble Pages site
        run: |
          mkdir -p _site/portfolio
          cp -R main-source/web/. _site/
          cp -R portfolio-source/portfolio/. _site/portfolio/
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
