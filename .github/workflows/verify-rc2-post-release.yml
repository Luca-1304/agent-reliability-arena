name: Diagnose rc2 main publication

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    if: github.head_ref == 'verify/rc2-post-release'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      MERGE_COMMIT: 144b48645fb7ad9a09e438e576dc8c2e8b868b9a
    steps:
      - name: Locate exact main release run
        id: locate
        run: |
          mkdir -p "$RUNNER_TEMP/rc2-main-diagnostic"
          gh api --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/release.yml/runs?branch=main&event=push&per_page=50" \
            > "$RUNNER_TEMP/rc2-main-diagnostic/workflow-runs.json"
          export RUNS_PATH="$RUNNER_TEMP/rc2-main-diagnostic/workflow-runs.json"
          export SELECTED_PATH="$RUNNER_TEMP/rc2-main-diagnostic/selected-run.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ['RUNS_PATH']).read_text(encoding='utf-8'))
          matches = [
              run for run in payload.get('workflow_runs', [])
              if run.get('head_sha') == os.environ['MERGE_COMMIT']
              and run.get('event') == 'push'
              and run.get('head_branch') == 'main'
          ]
          assert len(matches) == 1, [(r.get('id'), r.get('head_sha'), r.get('event')) for r in matches]
          selected = matches[0]
          Path(os.environ['SELECTED_PATH']).write_text(
              json.dumps(selected, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as handle:
              handle.write(f"run_id={selected['id']}\n")
          PY

      - name: Fetch job state and complete logs
        env:
          RUN_ID: ${{ steps.locate.outputs.run_id }}
        run: |
          gh api --method GET "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/jobs?per_page=100" \
            > "$RUNNER_TEMP/rc2-main-diagnostic/jobs.json"
          gh api --method GET "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/logs" \
            > "$RUNNER_TEMP/rc2-main-diagnostic/logs.zip"
          mkdir -p "$RUNNER_TEMP/rc2-main-diagnostic/logs"
          unzip -q "$RUNNER_TEMP/rc2-main-diagnostic/logs.zip" \
            -d "$RUNNER_TEMP/rc2-main-diagnostic/logs"

      - name: Write failure summary
        run: |
          export JOBS_PATH="$RUNNER_TEMP/rc2-main-diagnostic/jobs.json"
          export SUMMARY_PATH="$RUNNER_TEMP/rc2-main-diagnostic/summary.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ['JOBS_PATH']).read_text(encoding='utf-8'))
          jobs = payload.get('jobs', [])
          summary = {
              'schema_version': 'arena-rc2-main-publication-diagnostic-v1',
              'merge_commit': os.environ['MERGE_COMMIT'],
              'jobs': [
                  {
                      'id': job.get('id'),
                      'name': job.get('name'),
                      'status': job.get('status'),
                      'conclusion': job.get('conclusion'),
                      'failed_steps': [
                          step.get('name') for step in job.get('steps', [])
                          if step.get('conclusion') == 'failure'
                      ],
                  }
                  for job in jobs
              ],
              'provider_called': False,
              'comparative_claim_permitted': False,
          }
          Path(os.environ['SUMMARY_PATH']).write_text(
              json.dumps(summary, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Upload diagnostic evidence
        uses: actions/upload-artifact@v4
        with:
          name: rc2-main-publication-diagnostic
          path: ${{ runner.temp }}/rc2-main-diagnostic
          if-no-files-found: error
          retention-days: 1
