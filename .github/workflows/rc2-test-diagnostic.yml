name: Diagnose rc2 synthetic merge tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out synthetic PR merge
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Capture full test output
        run: |
          set +e
          {
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install --editable .
            python -m unittest discover -s tests -p "test_*.py" -v
          } > "$RUNNER_TEMP/rc2-merge-tests.log" 2>&1
          printf '%s\n' "$?" > "$RUNNER_TEMP/rc2-merge-tests-status.txt"
          exit 0

      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: rc2-merge-test-diagnostic
          path: |
            ${{ runner.temp }}/rc2-merge-tests.log
            ${{ runner.temp }}/rc2-merge-tests-status.txt
          if-no-files-found: error
          retention-days: 1
