name: Apply CycloneDX attestation repair

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'fix/cyclonedx-attestation-rc2'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/cyclonedx-attestation-rc2
          fetch-depth: 0
          persist-credentials: true

      - name: Add deterministic CycloneDX serial number
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/agent_reliability_arena/supply_chain.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'import re\nfrom pathlib import Path',
              'import re\nimport uuid\nfrom pathlib import Path',
              1,
          )
          text = text.replace(
              '    project_version = str(project["version"])\n    vendor_name = "agent-completion-verifier"',
              '    project_version = str(project["version"])\n'
              '    serial_number = f"urn:uuid:{uuid.uuid5(uuid.NAMESPACE_URL, f\'https://github.com/Luca-1304/agent-reliability-arena@{project_version}\')}"\n'
              '    vendor_name = "agent-completion-verifier"',
              1,
          )
          text = text.replace(
              '        "bomFormat": "CycloneDX",\n        "components":',
              '        "bomFormat": "CycloneDX",\n        "serialNumber": serial_number,\n        "components":',
              1,
          )
          text = text.replace(
              'def _verify_sbom(sbom: dict[str, Any], project: dict[str, Any], vendor: dict[str, Any]) -> None:\n'
              '    if sbom.get("bomFormat") != "CycloneDX" or sbom.get("specVersion") != "1.6":\n'
              '        raise SupplyChainError("invalid CycloneDX SBOM format")',
              'def _verify_sbom(sbom: dict[str, Any], project: dict[str, Any], vendor: dict[str, Any]) -> None:\n'
              '    expected_serial = f"urn:uuid:{uuid.uuid5(uuid.NAMESPACE_URL, f\'https://github.com/Luca-1304/agent-reliability-arena@{project[\"version\"]}\')}"\n'
              '    if (\n'
              '        sbom.get("bomFormat") != "CycloneDX"\n'
              '        or sbom.get("specVersion") != "1.6"\n'
              '        or sbom.get("serialNumber") != expected_serial\n'
              '    ):\n'
              '        raise SupplyChainError("invalid CycloneDX SBOM format or serial number")',
              1,
          )
          assert text.count('import uuid') == 1
          assert text.count('"serialNumber": serial_number') == 1
          assert text.count('expected_serial =') == 1
          path.write_text(text, encoding='utf-8')
          PY

      - name: Regenerate deterministic SBOM and manifest hash
        run: |
          PYTHONPATH=src python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          from agent_reliability_arena.supply_chain import build_cyclonedx_sbom

          root = Path('.').resolve()
          sbom_path = root / 'security/sbom.cdx.json'
          sbom_path.write_bytes(build_cyclonedx_sbom(root))
          parsed = json.loads(sbom_path.read_text(encoding='utf-8'))
          assert parsed['serialNumber'] == 'urn:uuid:a051633f-39f2-5f1b-b7af-3272e34636df'
          assert parsed['bomFormat'] and parsed['serialNumber'] and parsed['specVersion']

          manifest_path = root / 'security/supply-chain-manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          digest = hashlib.sha256(sbom_path.read_bytes()).hexdigest()
          matches = [item for item in manifest['files'] if item['path'] == 'security/sbom.cdx.json']
          assert len(matches) == 1
          matches[0]['sha256'] = digest
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Run complete verification
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --editable .
          python -m compileall -q src tests scripts
          python -m unittest discover -s tests -p "test_*.py" -v
          python scripts/verify_release.py
          python scripts/verify_disclosure_release.py
          python scripts/verify_repeated_release.py
          python scripts/verify_showcase_release.py
          python scripts/verify_launch_package.py
          python scripts/verify_citation_package.py
          python scripts/verify_supply_chain.py
          python scripts/verify_github_prerelease.py

      - name: Commit exact repair
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          test "$HEAD_REF" = "fix/cyclonedx-attestation-rc2"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/agent_reliability_arena/supply_chain.py \
            security/sbom.cdx.json \
            security/supply-chain-manifest.json
          git diff --cached --check
          test "$(git diff --cached --name-only | wc -l)" -eq 3
          git commit -m "fix: add deterministic CycloneDX serial number"
          git push origin "HEAD:$HEAD_REF"
