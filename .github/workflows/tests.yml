name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install editable package
        run: python -m pip install --editable .

      - name: Compile source
        run: python -m compileall -q src tests scripts

      - name: Run source tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run release verifier
        run: |
          python scripts/verify_release.py
          python scripts/verify_disclosure_release.py
          python scripts/verify_repeated_release.py
          python scripts/verify_showcase_release.py
          python scripts/verify_launch_package.py

      - name: Run installed commands
        run: |
          arena-run --config examples/fixture_experiment.json --output /tmp/arena-editable
          arena-replay --input /tmp/arena-editable > /tmp/editable-replay.json
          arena-export-web --input /tmp/arena-editable --output /tmp/editable-public.json
          arena-verify-showcase --root . > /tmp/editable-showcase.json
          arena-verify-launch-package --root . > /tmp/editable-launch-package.json

      - name: Build wheel
        run: python -m pip wheel . --no-deps --no-build-isolation --wheel-dir dist

      - name: Verify wheel in clean environment
        run: |
          python -m venv /tmp/arena-wheel
          /tmp/arena-wheel/bin/python -m pip install --no-deps dist/*.whl
          PATH="/tmp/arena-wheel/bin:$PATH" /tmp/arena-wheel/bin/python -m unittest discover -s tests -p "test_*.py" -v
          /tmp/arena-wheel/bin/python scripts/verify_release.py
          /tmp/arena-wheel/bin/python scripts/verify_disclosure_release.py
          /tmp/arena-wheel/bin/python scripts/verify_repeated_release.py
          /tmp/arena-wheel/bin/python scripts/verify_showcase_release.py
          /tmp/arena-wheel/bin/python scripts/verify_launch_package.py
          /tmp/arena-wheel/bin/arena-run --config examples/fixture_experiment.json --output /tmp/arena-wheel-run
          /tmp/arena-wheel/bin/arena-replay --input /tmp/arena-wheel-run > /tmp/wheel-replay.json
          /tmp/arena-wheel/bin/arena-export-web --input /tmp/arena-wheel-run --output /tmp/wheel-public.json
          /tmp/arena-wheel/bin/arena-verify-showcase --root . > /tmp/wheel-showcase.json
          /tmp/arena-wheel/bin/arena-verify-launch-package --root . > /tmp/wheel-launch-package.json
          /tmp/arena-wheel/bin/python - <<'PY'
          from pathlib import Path
          import json

          reference = Path("reference_runs/fixture-v1")
          wheel = Path("/tmp/arena-wheel-run")
          for relative in ("aggregate_metrics.json", "paired_results.jsonl", "report.md"):
              assert (reference / relative).read_bytes() == (wheel / relative).read_bytes(), relative
          public = json.loads(Path("/tmp/wheel-public.json").read_text(encoding="utf-8"))
          assert public["evidence_status"] == "deterministic_fixture"
          assert public["metrics"]["conditions"]["general"]["verified_complete"] == 2
          assert public["metrics"]["conditions"]["specialist"]["verified_complete"] == 6
          assert public["metrics"]["paired"]["additional_logical_model_calls"] == 36
          showcase = json.loads(Path("/tmp/wheel-showcase.json").read_text(encoding="utf-8"))
          assert showcase["files_verified"] == 7
          assert showcase["provider_called"] is False
          assert showcase["comparative_claim_permitted"] is False
          launch = json.loads(Path("/tmp/wheel-launch-package.json").read_text(encoding="utf-8"))
          assert launch["files_verified"] == 8
          assert launch["repository_publications"] == 1
          assert launch["prepared_external_actions"] >= 4
          assert launch["submitted_external_actions"] == 0
          assert launch["provider_called"] is False
          assert launch["comparative_claim_permitted"] is False
          PY
          /tmp/arena-wheel/bin/python -m pip check

      - name: Check installed dependencies
        run: python -m pip check
