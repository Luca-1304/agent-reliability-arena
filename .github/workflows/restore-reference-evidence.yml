name: restore reference evidence

on:
  push:
    branches: [main]
    paths: [.github/workflows/restore-reference-evidence.yml]

permissions:
  contents: write

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download checksum-matched archive
        shell: bash
        run: |
          set -euo pipefail
          expected='4fe27252ca26966bb70d3bef8dd611f623580b1b6e4120734cede0b2e8d13016'
          urls=(
            'https://www.adobe.com/files/id/urn:aaid:sc:EU:564460a9-e7fc-4c9d-9e7a-8742a18acaa6'
            'https://at.adobe.com/CAnr0UZ5wtkMqH83'
            'https://platform-cs-irl1.adobe.io/content/storage/id/urn:aaid:sc:EU:564460a9-e7fc-4c9d-9e7a-8742a18acaa6'
          )
          for url in "${urls[@]}"; do
            rm -f /tmp/arena-release.zip
            if curl --location --fail --silent --show-error --retry 2 --output /tmp/arena-release.zip "$url"; then
              actual="$(sha256sum /tmp/arena-release.zip | awk '{print $1}')"
              [[ "$actual" == "$expected" ]] && exit 0
            fi
          done
          echo 'No endpoint returned the verified release archive.' >&2
          exit 1

      - name: Restore ignored evidence files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/arena-unpack
          mkdir -p /tmp/arena-unpack
          unzip -q /tmp/arena-release.zip -d /tmp/arena-unpack
          source_dir='/tmp/arena-unpack/agent_reliability_arena_v0.1.0/reference_runs/fixture-v1/runs'
          test -f "$source_dir/general/success.json"
          rm -rf reference_runs/fixture-v1/runs
          mkdir -p reference_runs/fixture-v1
          cp -a "$source_dir" reference_runs/fixture-v1/runs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f reference_runs/fixture-v1/runs
          git commit -m 'Restore verified per-scenario reference evidence'
          git push origin HEAD:main
