name: launch-package-diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install editable package
        run: python -m pip install --editable .

      - name: Capture focused test output
        run: |
          set +e
          python -m unittest tests.test_launch_package -v > launch-package-test-output.txt 2>&1
          status=$?
          echo "exit_status=$status" >> launch-package-test-output.txt
          exit 0

      - name: Upload focused output
        uses: actions/upload-artifact@v4
        with:
          name: launch-package-test-output
          path: launch-package-test-output.txt
          if-no-files-found: error
