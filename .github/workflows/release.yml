name: Publish attested v0.2.0rc2 prerelease

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - "CITATION.cff"
      - "CHANGELOG.md"
      - "docs/RELEASE_NOTES_v0.2.0rc2.md"
      - "release/**"
      - "security/**"
      - "citation/provenance.json"
      - "pyproject.toml"
      - "scripts/verify_github_prerelease.py"
      - "src/agent_reliability_arena/github_prerelease.py"
      - "src/agent_reliability_arena/citation_package.py"
      - "src/agent_reliability_arena/supply_chain.py"
      - "tests/test_github_prerelease.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - "CITATION.cff"
      - "CHANGELOG.md"
      - "docs/RELEASE_NOTES_v0.2.0rc2.md"
      - "release/**"
      - "security/**"
      - "citation/provenance.json"
      - "pyproject.toml"
      - "scripts/verify_github_prerelease.py"
      - "src/agent_reliability_arena/github_prerelease.py"
      - "src/agent_reliability_arena/citation_package.py"
      - "src/agent_reliability_arena/supply_chain.py"
      - "tests/test_github_prerelease.py"

permissions:
  contents: read

concurrency:
  group: publish-v0.2.0rc2-prerelease
  cancel-in-progress: false

jobs:
  build:
    name: Verify and build rc2 assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling and package
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m pip install --editable .

      - name: Verify all public release boundaries
        run: |
          python scripts/verify_showcase_release.py
          python scripts/verify_launch_package.py
          python scripts/verify_citation_package.py
          python scripts/verify_supply_chain.py
          python scripts/verify_github_prerelease.py

      - name: Build wheel and source distribution
        run: python -m build

      - name: Build source-commit release bundle
        run: |
          python scripts/verify_github_prerelease.py \
            --dist dist \
            --output release-bundle \
            --source-commit "$GITHUB_SHA"

      - name: Verify release record and checksums
        run: |
          test -f release-bundle/release-record.json
          test -f release-bundle/SHA256SUMS
          test -f release-bundle/sbom.cdx.json
          test -f release-bundle/supply-chain-manifest.json
          test -f release-bundle/provenance.json
          cd release-bundle
          sha256sum --check SHA256SUMS

      - name: Upload verified rc2 assets
        uses: actions/upload-artifact@v4
        with:
          name: v0.2.0rc2-prerelease-assets
          path: release-bundle
          if-no-files-found: error
          retention-days: 14

  attest:
    name: Attest and verify executable artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download verified rc2 assets
        uses: actions/download-artifact@v4
        with:
          name: v0.2.0rc2-prerelease-assets
          path: release-bundle

      - name: Recheck bundle integrity
        run: |
          cd release-bundle
          sha256sum --check SHA256SUMS

      - name: Create SLSA provenance attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            release-bundle/*.whl
            release-bundle/*.tar.gz

      - name: Create CycloneDX SBOM attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            release-bundle/*.whl
            release-bundle/*.tar.gz
          sbom-path: release-bundle/sbom.cdx.json

      - name: Verify online provenance attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in release-bundle/*.whl release-bundle/*.tar.gz; do
            gh attestation verify "$artifact" \
              -R "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --source-digest "$GITHUB_SHA" \
              --source-ref refs/heads/main
          done

      - name: Verify online CycloneDX attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in release-bundle/*.whl release-bundle/*.tar.gz; do
            gh attestation verify "$artifact" \
              -R "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
              --source-digest "$GITHUB_SHA" \
              --source-ref refs/heads/main \
              --predicate-type https://cyclonedx.org/bom
          done

  publish:
    name: Publish immutable attested rc2 prerelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, attest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: v0.2.0rc2
      RELEASE_TITLE: Agent Reliability Arena v0.2.0rc2
      ASSET_BUNDLE: v0.2.0rc2-prerelease-assets
    steps:
      - name: Download verified rc2 assets
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ASSET_BUNDLE }}
          path: release-bundle

      - name: Recheck bundle integrity
        run: |
          cd release-bundle
          sha256sum --check SHA256SUMS

      - name: Refuse conflicting tag or release
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing GitHub release $TAG" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing Git tag $TAG" >&2
            exit 1
          fi

      - name: Publish verified prerelease
        run: |
          gh release create "$TAG" release-bundle/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TITLE" \
            --notes-file release-bundle/RELEASE_NOTES_v0.2.0rc2.md \
            --target "$GITHUB_SHA" \
            --prerelease

      - name: Verify published release metadata and assets
        run: |
          test "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)" = "$TAG"
          test "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json name --jq .name)" = "$RELEASE_TITLE"
          test "$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isPrerelease --jq .isPrerelease)" = "true"
          EXPECTED="$(find release-bundle -maxdepth 1 -type f -printf '%f\n' | sort)"
          ACTUAL="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort)"
          test "$ACTUAL" = "$EXPECTED"
          RELEASE_URL="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"
          test -n "$RELEASE_URL"
          printf 'Published attested prerelease: %s\n' "$RELEASE_URL"
