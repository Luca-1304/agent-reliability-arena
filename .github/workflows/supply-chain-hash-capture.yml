name: Capture supply-chain hashes

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture exact public file hashes
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          paths = (
              ".github/dependabot.yml",
              ".github/workflows/codeql.yml",
              "SECURITY.md",
              "docs/SUPPLY_CHAIN_SECURITY.md",
              "security/sbom.cdx.json",
          )
          payload = {
              path: hashlib.sha256(Path(path).read_bytes()).hexdigest()
              for path in paths
          }
          Path("supply-chain-hashes.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload hash inventory
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-hashes
          path: supply-chain-hashes.json
          if-no-files-found: error
          retention-days: 1
