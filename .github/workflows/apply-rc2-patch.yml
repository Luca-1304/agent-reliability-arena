name: Apply reviewed rc2 source patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'feature/attested-v0.2.0rc2-prerelease'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v4
        with:
          ref: feature/attested-v0.2.0rc2-prerelease
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct and verify reviewed source patch
        run: |
          cat release/rc2-source-patch/part-* > "$RUNNER_TEMP/rc2-source.patch.gz.b64"
          base64 --decode "$RUNNER_TEMP/rc2-source.patch.gz.b64" > "$RUNNER_TEMP/rc2-source.patch.gz"
          echo "76652942921d543ad085d3a5cf114c18c20e51776dffbdfe10aa75c1ba0332f2  $RUNNER_TEMP/rc2-source.patch.gz" | sha256sum --check
          gzip --decompress --stdout "$RUNNER_TEMP/rc2-source.patch.gz" > "$RUNNER_TEMP/rc2-source.patch"
          echo "9747aaf1d1ecfcd9f03fdfc36d1a653236f2fa0f3a554bf1fe746abd7cc343f0  $RUNNER_TEMP/rc2-source.patch" | sha256sum --check
          ! grep -q '^diff --git a/\.github/' "$RUNNER_TEMP/rc2-source.patch"
          git apply --check "$RUNNER_TEMP/rc2-source.patch"
          git apply --whitespace=nowarn "$RUNNER_TEMP/rc2-source.patch"
          rm -rf release/rc2-source-patch

      - name: Capture complete verification result
        run: |
          set +e
          {
            set -x
            for attempt in 1 2 3; do
              python -m pip install --upgrade pip setuptools wheel && break
              test "$attempt" -lt 3
              sleep $((attempt * 5))
            done
            python -m pip install --editable .
            python -m compileall -q src tests scripts
            python -m unittest discover -s tests -p "test_*.py" -v
            python scripts/verify_release.py
            python scripts/verify_disclosure_release.py
            python scripts/verify_repeated_release.py
            python scripts/verify_showcase_release.py
            python scripts/verify_launch_package.py
            python scripts/verify_citation_package.py
            python scripts/verify_supply_chain.py
            python scripts/verify_github_prerelease.py
          } > "$RUNNER_TEMP/rc2-source-applicator.log" 2>&1
          printf '%s\n' "$?" > "$RUNNER_TEMP/rc2-source-applicator-status.txt"
          exit 0

      - name: Upload complete source-applicator evidence
        uses: actions/upload-artifact@v4
        with:
          name: rc2-source-applicator-evidence
          path: |
            ${{ runner.temp }}/rc2-source-applicator.log
            ${{ runner.temp }}/rc2-source-applicator-status.txt
          if-no-files-found: error
          retention-days: 1

      - name: Commit exact reviewed source implementation
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          test "$(cat "$RUNNER_TEMP/rc2-source-applicator-status.txt")" = "0" || {
            cat "$RUNNER_TEMP/rc2-source-applicator.log" >&2
            exit 1
          }
          test "$HEAD_REF" = "feature/attested-v0.2.0rc2-prerelease"
          test -z "$(git diff --name-only -- .github)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "release: implement attested v0.2.0rc2 candidate"
          git push origin "HEAD:$HEAD_REF"
