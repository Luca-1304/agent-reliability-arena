name: Diagnose employer layer

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feature/employer-review-layer'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --editable .

      - name: Capture full source-test output
        id: tests
        run: |
          set +e
          python -m unittest discover -s tests -p "test_*.py" -v > "$RUNNER_TEMP/employer-tests.log" 2>&1
          status="$?"
          set -e
          printf '%s\n' "$status" > "$RUNNER_TEMP/employer-tests.status"
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: employer-layer-test-diagnostic
          path: |
            ${{ runner.temp }}/employer-tests.log
            ${{ runner.temp }}/employer-tests.status
          if-no-files-found: error
          retention-days: 1

      - name: Preserve test status
        env:
          TEST_STATUS: ${{ steps.tests.outputs.status }}
        run: test "$TEST_STATUS" = "0"
